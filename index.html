<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matemática Avante 🧮</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --accent: #38bdf8; 
            --success: #22c55e;
            --danger: #ef4444;
        }
        body.light-mode { 
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #1e293b; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: 0.3s;
        }
        
        .container { width: 100%; max-width: 480px; box-sizing: border-box; }
        
        /* NOVO: Logo Fixa e Redonda */
        header { 
            position: sticky; top: 0; z-index: 1000; background: var(--bg);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            padding: 10px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }
        .logo { 
            width: 55px; height: 55px; 
            border-radius: 50%; border: 3px solid var(--accent); 
            object-fit: cover; 
        }
        .theme-btn { background: rgba(255, 255, 255, 0.1); border: 2px solid var(--accent); font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; color: var(--text); }
        
        .card { 
            background: var(--card); 
            padding: 22px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
            box-sizing: border-box;
        }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 12px; 
            border: 1px solid #475569; 
            box-sizing: border-box; 
            font-size: 16px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text);
        }
        body.light-mode input, body.light-mode select { background: #fff; }
        
        button { 
            background: var(--accent); 
            color: #0f172a;
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin: 6px 0; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        
        .hidden { display: none; }
        
        .feedback { padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; text-align: center; }
        
        ul { padding-left: 20px; margin: 15px 0; }
        li { margin-bottom: 12px; line-height: 1.5; }
        a { color: var(--accent); font-weight: bold; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #475569; padding: 10px; text-align: left; }
        th { background: rgba(0,0,0,0.2); }
        .table-wrapper { width: 100%; overflow-x: auto; }

        /* NOVO: Gráfico Admin */
        .progress-bar { background: #334155; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: var(--accent); height: 100%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <!-- IMAGEM CORRIGIDA -->
            <img src="star-blue.png" class="logo" alt="Logo" onerror="this.style.display='none'">
            <h1 style="font-size: 1.4rem; margin: 0;">Matemática Avante</h1>
        </div>
        <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">💡</button>
    </header>

    <!-- Tela de Login -->
    <div id="login-screen" class="card">
        <h2 style="margin-top: 0; text-align: center;">🔐 Identificação</h2>
        <input type="text" id="user-name" placeholder="👤 Digite seu nome completo">
        
        <label style="font-weight: bold; font-size: 14px;">Selecione seu perfil:</label>
        <select id="role-select" onchange="togglePasswordField()">
            <option value="aluno">Aluno (Acesso Livre)</option>
            <option value="admin">Administrador (Requer Senha)</option>
        </select>

        <div id="pass-field" class="hidden">
            <input type="password" id="pass-code" placeholder="🔑 Digite a senha administrativa">
        </div>

        <button onclick="efetuarLogin()">Entrar no Portal 🚀</button>
    </div>

    <!-- Interface Principal -->
    <div id="main-screen" class="hidden">
        <!-- NOVO: Dashboard do Aluno com Medalhas -->
        <div class="card" style="text-align: center;">
            <h3 id="display-name" style="margin: 5px 0;"></h3>
            <p>Pontos: <b id="display-points" style="color:var(--accent)">0</b> | Medalha: <span id="display-medal">🥉 Bronze</span></p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button onclick="carregarLoja()" style="background:#fbbf24;">🛍️ Loja</button>
                <button onclick="carregarRanking()" style="background:#a855f7; color:white;">🏆 Ranking</button>
            </div>
        </div>

        <div class="card" style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="carregarNivel('basico')">📚 Básico</button>
            <button onclick="carregarNivel('medio')">🧠 Intermediário</button>
            <button onclick="carregarNivel('avancado')">🚀 Avançado</button>
            <button onclick="carregarCanais()" style="background: #a855f7; color: white;">🔗 Referências</button>
            <button id="admin-btn" class="hidden" onclick="carregarPainelAdmin()" style="background: var(--danger); color: white; grid-column: span 2;">⚙️ Painel Admin</button>
        </div>
        
        <div id="content-area" class="card">
            <h3 style="margin-top: 0; text-align: center; color: var(--accent);">✨ Boas-vindas!</h3>
            <p style="text-align: center; line-height: 1.6;">Escolha uma das opções acima para estudar.</p>
        </div>
    </div>
</div>

<script>
    const SECRET_KEY = "SUA_SENHA_AQUI";
    
    // VARIÁVEIS PARA AS NOVAS FUNÇÕES
    let pontosGlobais = parseInt(localStorage.getItem('user_pts') || 0);

    const bancoMatematica = {
        basico: { titulo: "📚 Básico", teoria: "Regra de 3 e %. 15% de 200 é 30.", pergunta: "Quanto é 15% de 200?", gabarito: "30" },
        medio: { titulo: "🧠 Intermediário", teoria: "Ângulos internos de um triângulo = 180°.", pergunta: "Soma ângulos triângulo?", gabarito: "180" },
        avancado: { titulo: "🚀 Avançado", teoria: "Determinante Matriz Identidade 2x2 = 1.", pergunta: "Det da Matriz Identidade 2x2?", gabarito: "1" }
    };

    function togglePasswordField() {
        const perfil = document.getElementById('role-select').value;
        document.getElementById('pass-field').classList.toggle('hidden', perfil !== 'admin');
    }

    function efetuarLogin() {
        const nome = document.getElementById('user-name').value.trim();
        const perfil = document.getElementById('role-select').value;
        const senhaInserida = document.getElementById('pass-code').value;

        if (nome === "") return alert("Preencha seu nome!");
        if (perfil === 'admin' && senhaInserida !== SECRET_KEY) return alert("Senha incorreta!");

        let registros = JSON.parse(localStorage.getItem('matematica_logs') || "[]");
        registros.push({ estudante: nome, timestamp: new Date().toLocaleTimeString(), progresso: 'Login' });
        localStorage.setItem('matematica_logs', JSON.stringify(registros));

        document.getElementById('display-name').innerText = nome;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        if (perfil === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
        atualizarUI();
    }

    function atualizarUI() {
        document.getElementById('display-points').innerText = pontosGlobais;
        let medalha = "🥉 Bronze";
        if (pontosGlobais >= 100) medalha = "🥈 Prata";
        if (pontosGlobais >= 200) medalha = "🥇 Ouro";
        document.getElementById('display-medal').innerText = medalha;
    }

    function carregarNivel(nivel) {
        const item = bancoMatematica[nivel];
        document.getElementById('content-area').innerHTML = `
            <h3>${item.titulo}</h3>
            <p>${item.pergunta}</p>
            <input type="number" id="resposta-estudante">
            <button onclick="verificarQuestao('${nivel}')">Verificar</button>
            <div id="zona-feedback"></div>
        `;
    }

    function verificarQuestao(nivel) {
        const resp = document.getElementById('resposta-estudante').value;
        if (resp === bancoMatematica[nivel].gabarito) {
            pontosGlobais += 20;
            localStorage.setItem('user_pts', pontosGlobais);
            alert("Acertou! +20 pontos.");
            atualizarUI();
        } else {
            alert("Incorreto!");
        }
    }

    function carregarCanais() {
        document.getElementById('content-area').innerHTML = `<h3>Referências</h3><ul><li>Professor Ferretto</li></ul>`;
    }

    // --- NOVAS FUNÇÕES ADICIONADAS ---

    function carregarRanking() {
        // Simulação baseada nos logs de acesso
        document.getElementById('content-area').innerHTML = `
            <h3>🏆 Ranking dos Estudantes</h3>
            <div class="ranking-item">1º Você - ${pontosGlobais} pts</div>
        `;
    }

    function carregarLoja() {
        document.getElementById('content-area').innerHTML = `
            <h3>🛍️ Loja de Acessórios</h3>
            <p>Seus Pontos: ${pontosGlobais}</p>
            <button onclick="alert('Item comprado!')">Caneta Neon (50 pts)</button>
        `;
    }

    function carregarPainelAdmin() {
        const logs = JSON.parse(localStorage.getItem('matematica_logs') || "[]");
        const ocupacao = Math.min(logs.length * 10, 100); // Gráfico simples
        document.getElementById('content-area').innerHTML = `
            <h3>⚙️ Painel de Monitoramento</h3>
            <p>Engajamento da Turma:</p>
            <div class="progress-bar"><div class="progress-fill" style="width:${ocupacao}%"></div></div>
            <h4>Registros:</h4>
            ${logs.slice(-5).map(l => `<p>${l.estudante} - ${l.progresso}</p>`).join('')}
        `;
    }
</script>
</body>
</html>
