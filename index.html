<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática Avante | Portal Educacional</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #2D3748;
            --accent-blue: #007BFF;
            --light-blue: #87CEEB;
            --text-main: #f0f0f0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabeçalho Premium */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { width: 50px; height: 50px; }

        /* Card de Login */
        #login-area {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            margin-top: 100px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #4A5568;
            background: #1A202C;
            color: white;
            box-sizing: border-box;
        }

        button.btn-main {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.btn-main:hover {
            background-color: var(--light-blue);
            transform: scale(1.02);
        }

        /* Área do App */
        #main-app { width: 80%; margin-top: 50px; }
        .hidden { display: none; }
        
        nav { display: flex; gap: 20px; justify-content: center; }
        .nav-btn { background: #333; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="star-blue.png" alt="Logo Matemática Avante">
            <h1>Matemática Avante</h1>
        </div>
        <button id="theme-toggle">Alternar Modo</button>
    </header>

    <!-- Área de Login -->
    <div id="login-area">
        <h2>Bem-vindo ao seu Futuro</h2>
        <input type="text" id="user-role" placeholder="Aluno ou Admin">
        <input type="password" id="password" placeholder="Senha (Admin: Kyla26)">
        <button class="btn-main" onclick="realizarLogin()">Entrar na Plataforma</button>
    </div>

    <!-- Área do App -->
    <div id="main-app" class="hidden">
        <nav>
            <button class="nav-btn" onclick="showTab('facil')">Nível Básico</button>
            <button class="nav-btn" onclick="showTab('medio')">Nível Intermediário</button>
            <button class="nav-btn" onclick="showTab('avancado')">Nível Avançado</button>
        </nav>
        <main id="content" style="text-align: center; margin-top: 50px;">
            <p>Escolha um nível para começar sua jornada matemática.</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAcdDMUnIy5seRWvKCR5gO9wkZO4rDK4rc",
            authDomain: "matematica-avante.firebaseapp.com",
            databaseURL: "https://matematica-avante-default-rtdb.firebaseio.com",
            projectId: "matematica-avante",
            storageBucket: "matematica-avante.firebasestorage.app",
            messagingSenderId: "856243957420",
            appId: "1:856243957420:web:2246db8924b9a7384db909"
        };
        initializeApp(firebaseConfig);

        window.realizarLogin = () => {
            const role = document.getElementById('user-role').value;
            const password = document.getElementById('password').value;

            if (role.toLowerCase() === 'admin' && password === 'Kyla26') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else if (role.toLowerCase() === 'aluno') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                alert("Login ou senha incorretos!");
            }
        };

        window.showTab = (tabName) => {
            document.getElementById('content').innerHTML = `
                <h2>Nível ${tabName.charAt(0).toUpperCase() + tabName.slice(1)}</h2>
                <p>Conteúdo de ${tabName} sendo carregado do banco de dados...</p>
                <img src="star-blue.png" style="width:100px; margin-top:20px;">
            `;
        };
    </script>
</body>
</html>
