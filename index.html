<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática Avante 🧮</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; }
        body.light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 480px; margin: auto; }
        
        /* Header mantido com a logo e estilo original */
        header { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px 0; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .theme-btn { font-size: 24px; cursor: pointer; background: none; border: none; }
        
        .card { background: var(--card); padding: 22px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin: 6px 0; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; }
        .hidden { display: none; }
        .feedback { padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img src="star-blue.png" class="logo" alt="Logo" onerror="this.style.display='none'">
            <h1 style="font-size: 1.4rem; margin: 0;">Matemática Avante 🧮</h1>
        </div>
        <button class="theme-btn" onclick="document.body.classList.toggle('light-mode')">⭐</button>
    </header>

    <!-- Login -->
    <div id="login-screen" class="card">
        <h2 style="text-align: center;">🔐 Identificação</h2>
        <input type="text" id="user-name" placeholder="👤 Seu nome completo">
        <select id="role-select" style="padding:10px; width:100%; border-radius:10px;">
            <option value="aluno">Aluno</option>
            <option value="admin">Administrador</option>
        </select>
        <button onclick="efetuarLogin()">Entrar no Portal 🚀</button>
    </div>

    <!-- Main -->
    <div id="main-screen" class="hidden">
        <div class="card">
            <h3>Olá, <span id="display-name"></span>!</h3>
            <p>Pontos: <b id="display-points">0</b> | Medalha: <span id="display-medal">🥉 Bronze</span></p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <button onclick="carregarLoja()" style="background:#fbbf24;">🛍️ Loja</button>
                <button onclick="carregarRanking()" style="background:#a855f7; color:white;">🏆 Ranking</button>
            </div>
        </div>
        
        <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button onclick="iniciarQuiz('basico')">📚 Básico</button>
            <button onclick="iniciarQuiz('medio')">🧠 Intermediário</button>
            <button onclick="iniciarQuiz('avancado')">🚀 Avançado</button>
            <button onclick="carregarRefs()" style="background:#8b5cf6; color:white;">🔗 Referências</button>
            <button id="admin-btn" class="hidden" onclick="carregarAdmin()" style="background:var(--danger); color:white; grid-column: span 2;">⚙️ Painel Admin</button>
        </div>
        
        <div id="content-area" class="card">
            <h3 style="text-align: center;">Escolha um nível para começar!</h3>
        </div>
    </div>
</div>

<script>
    // Banco de Dados Profundo (Conteúdo + Perguntas)
    const banco = {
        basico: [
            { t: "Porcentagem é uma parte de um todo de 100. Regra: 15% de 200 é 15 x 2.", p: "Quanto é 15% de 200?", r: "30" },
            { t: "Regra de três simples: mantém a proporção entre valores.", p: "Se 2 pães custam 4 reais, 5 pães custam?", r: "10" }
        ],
        medio: [
            { t: "Triângulos: a soma dos ângulos internos é sempre 180 graus.", p: "Soma ângulos triângulo?", r: "180" }
        ],
        avancado: [
            { t: "Matriz Identidade: diagonal principal é 1.", p: "Det da Matriz Identidade 2x2?", r: "1" }
        ]
    };

    let user = { name: "", pts: 0, nivel: '', index: 0, fase: 'teoria' };

    function efetuarLogin() {
        user.name = document.getElementById('user-name').value;
        const role = document.getElementById('role-select').value;
        document.getElementById('display-name').innerText = user.name;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        if(role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
    }

    // Lógica de Quiz Sequencial
    function iniciarQuiz(nivel) {
        user.nivel = nivel; user.index = 0; user.fase = 'teoria';
        renderizar();
    }

    function renderizar() {
        const item = banco[user.nivel][user.index];
        const area = document.getElementById('content-area');
        if(user.fase === 'teoria') {
            area.innerHTML = `<h3>📖 Teoria:</h3><p>${item.t}</p><button onclick="user.fase='pergunta'; renderizar()">Continuar para Pergunta</button>`;
        } else {
            area.innerHTML = `<h3>📝 Pergunta:</h3><p>${item.p}</p><input type="number" id="resp"><button onclick="verificar()">Verificar</button>`;
        }
    }

    function verificar() {
        const resp = document.getElementById('resp').value;
        if(resp === banco[user.nivel][user.index].r) {
            user.pts += 20;
            document.getElementById('display-points').innerText = user.pts;
            alert("Acertou! Liberando próxima...");
            user.index++;
            if(user.index < banco[user.nivel].length) {
                user.fase = 'teoria';
                renderizar();
            } else {
                document.getElementById('content-area').innerHTML = "<h3>🎉 Nível concluído com sucesso!</h3>";
            }
        } else {
            alert("Resposta incorreta, revise o conceito!");
        }
    }

    // Funcionalidades Adicionais
    function carregarLoja() {
        document.getElementById('content-area').innerHTML = `<h3>🛍️ Loja</h3><button onclick="alert('Item aplicado!')">Comprar Estilo Dark (50 pts)</button>`;
    }

    function carregarRefs() {
        document.getElementById('content-area').innerHTML = `<h3>🔗 Referências</h3><ul>
            <li><a href="https://www.youtube.com/@ProfessorFerreto">Prof. Ferretto</a></li>
            <li><a href="https://www.youtube.com/@MatematicaRio">Matemática Rio</a></li>
        </ul>`;
    }

    function carregarAdmin() {
        document.getElementById('content-area').innerHTML = `<h3>⚙️ Admin</h3><p>Monitorando turma...</p><button onclick="alert('Medalha enviada!')">Enviar Medalha</button>`;
    }

    function carregarRanking() {
        document.getElementById('content-area').innerHTML = `<h3>🏆 Ranking</h3><p>1º ${user.name} - ${user.pts} pts</p>`;
    }
</script>
</body>
</html>
