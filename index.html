<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Matemática Avante 🧮</title>
    <style>
        :root { --bg-color: #0f172a; --text-color: #f8fafc; --card-bg: #1e293b; --accent-blue: #38bdf8; }
        body.light-mode { --bg-color: #f1f5f9; --text-color: #1e293b; --card-bg: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; transition: 0.5s; padding: 20px; }
        
        .logo-round { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent-blue); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-blue); padding-bottom: 10px; }
        
        #login-area, #main-app { background: var(--card-bg); padding: 30px; border-radius: 20px; max-width: 600px; margin: 20px auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; }
        button { background: var(--accent-blue); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="star-blue.png" alt="Logo" class="logo-round" onerror="this.style.display='none'">
            <h1>Matemática Avante 🧮</h1>
        </div>
        <button onclick="document.body.classList.toggle('light-mode')">💡</button>
    </header>

    <div id="login-area">
        <h2>🔐 Acesso</h2>
        <input type="text" id="username" placeholder="Nome do Aluno ou Admin">
        <input type="password" id="pass" placeholder="Senha (Admin: Kyla26)">
        <button onclick="fazerLogin()">Entrar 🚀</button>
    </div>

    <div id="main-app" class="hidden">
        <div id="nav-buttons">
            <button onclick="carregarConteudo('basico')">📚 Básico</button>
            <button onclick="carregarConteudo('medio')">🧠 Médio</button>
            <button onclick="carregarConteudo('avancado')">🚀 Avançado</button>
            <button id="admin-btn" class="hidden" onclick="abrirAdmin()">⚙️ Painel Admin</button>
        </div>
        <div id="display-area" style="margin-top:20px;"></div>
    </div>

    <script>
        // Função de Login e Registro de Atividade
        function fazerLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('pass').value;
            
            if(user && (pass === 'Kyla26' || pass === 'aluno123')) {
                const isAdmin = (pass === 'Kyla26');
                
                // Salvar Log de Acesso
                let logs = JSON.parse(localStorage.getItem('logs') || "[]");
                logs.push({ usuario: user, hora: new Date().toLocaleTimeString(), tipo: isAdmin ? "Admin" : "Aluno" });
                localStorage.setItem('logs', JSON.stringify(logs));
                
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                if(isAdmin) document.getElementById('admin-btn').classList.remove('hidden');
            } else { alert("❌ Login ou senha incorretos!"); }
        }

        // Registrar Progresso do Aluno
        function carregarConteudo(nivel) {
            // Salvar Progresso
            const user = document.getElementById('username').value;
            localStorage.setItem('progresso_' + user, nivel);
            
            document.getElementById('display-area').innerHTML = `
                <h2>Nível: ${nivel.toUpperCase()}</h2>
                <p>Estudando: ${nivel === 'basico' ? 'Aritmética' : 'Geometria'}</p>
                <button onclick="alert('Concluído!')">Marcar como Finalizado ✅</button>
            `;
        }

        // Painel do Administrador
        function abrirAdmin() {
            const logs = JSON.parse(localStorage.getItem('logs') || "[]");
            let html = "<h2>⚙️ Painel Administrativo</h2><table><tr><th>Usuário</th><th>Tipo</th><th>Hora</th></tr>";
            
            logs.forEach(log => {
                html += `<tr><td>${log.usuario}</td><td>${log.tipo}</td><td>${log.hora}</td></tr>`;
            });
            
            html += "</table><button onclick='localStorage.clear(); location.reload();'>Limpar Dados 🧹</button>";
            document.getElementById('display-area').innerHTML = html;
        }
    </script>
</body>
</html>
