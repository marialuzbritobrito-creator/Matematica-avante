<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática Avante</title>
    <style>
        :root {
            --blue-dark: #003366;
            --blue-light: #87CEEB;
            --bg-color: #ffffff;
            --text-color: #333;
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #f0f0f0;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; transition: 0.3s; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue-dark); padding-bottom: 10px; }
        nav { margin: 20px 0; }
        nav button { background-color: var(--blue-dark); color: white; border: none; padding: 10px 20px; margin-right: 10px; cursor: pointer; border-radius: 5px; }
        .star-icon { width: 50px; height: 50px; display: block; margin-top: 20px; }
        #login-area, #main-app { margin-top: 30px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Matemática Avante</h1>
        <button id="theme-toggle">Alternar Modo</button>
    </header>

    <!-- Área de Login -->
    <div id="login-area">
        <h2>Login</h2>
        <input type="text" id="user-role" placeholder="Aluno ou Admin">
        <input type="password" id="password" placeholder="Senha (Admin: Kyla26)">
        <button onclick="realizarLogin()">Entrar</button>
    </div>

    <!-- Área do App -->
    <div id="main-app" class="hidden">
        <nav>
            <button onclick="showTab('facil')">Fácil</button>
            <button onclick="showTab('medio')">Médio</button>
            <button onclick="showTab('avancado')">Avançado</button>
        </nav>
        <main id="content">
            <p>Escolha um nível para começar. O sistema irá registrar seu progresso automaticamente.</p>
            <img src="star-blue.png" alt="Conquista" class="star-icon">
        </main>
        <div id="admin-dashboard" class="hidden">
            <h3>Painel do Administrador</h3>
            <p>Monitoramento de notas e métricas de desempenho dos alunos.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAcdDMUnIy5seRWvKCR5gO9wkZO4rDK4rc",
            authDomain: "matematica-avante.firebaseapp.com",
            databaseURL: "https://matematica-avante-default-rtdb.firebaseio.com",
            projectId: "matematica-avante",
            storageBucket: "matematica-avante.firebasestorage.app",
            messagingSenderId: "856243957420",
            appId: "1:856243957420:web:2246db8924b9a7384db909"
        };
        initializeApp(firebaseConfig);

        // Lógica de Login
        window.realizarLogin = () => {
            const role = document.getElementById('user-role').value;
            const password = document.getElementById('password').value;

            if (role.toLowerCase() === 'admin' && password === 'Kyla26') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                alert("Bem-vindo, Administrador!");
            } else if (role.toLowerCase() === 'aluno') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                alert("Login ou senha incorretos!");
            }
        };

        // Troca de Tema
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // Abas e Conteúdo
        window.showTab = (tabName) => {
            document.getElementById('content').innerHTML = `
                <h2>Nível ${tabName.charAt(0).toUpperCase() + tabName.slice(1)}</h2>
                <p>Carregando temas de ${tabName} do Firebase...</p>
                <img src="star-blue.png" alt="Conquista" class="star-icon">
            `;
        };
    </script>
</body>
</html>
