<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática Avante 🧮</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 450px; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin: 5px 0; }
        
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" class="logo" alt="Logo" onerror="this.style.display='none'">
        <h1>Matemática Avante</h1>
    </header>

    <!-- Login -->
    <div id="login-screen" class="card">
        <h2>🔐 Entre no Sistema</h2>
        <input type="text" id="user-name" placeholder="Seu nome">
        
        <label>Você é:</label>
        <select id="role-select" onchange="togglePass()">
            <option value="aluno">Aluno (Sem senha)</option>
            <option value="admin">Administrador</option>
        </select>

        <div id="pass-field" class="hidden">
            <input type="password" id="pass-code" placeholder="Digite a senha de administrador">
        </div>

        <button onclick="login()">Entrar 🚀</button>
    </div>

    <!-- App -->
    <div id="main-screen" class="hidden">
        <div class="card">
            <button onclick="renderContent('basico')">📚 Básico</button>
            <button onclick="renderContent('medio')">🧠 Intermediário</button>
            <button onclick="renderContent('avancado')">🚀 Avançado</button>
            <button id="admin-btn" class="hidden" onclick="renderAdmin()" style="background:#ef4444;">⚙️ Painel Admin</button>
        </div>
        <div id="content-area" class="card">
            <h3>Selecione um nível.</h3>
        </div>
    </div>
</div>

<script>
    // A senha fica escondida aqui no código, longe dos campos de digitação
    const SECRET_KEY = "Kyla26";

    function togglePass() {
        const role = document.getElementById('role-select').value;
        const field = document.getElementById('pass-field');
        field.classList.toggle('hidden', role === 'aluno');
    }

    function login() {
        const name = document.getElementById('user-name').value;
        const role = document.getElementById('role-select').value;
        const pass = document.getElementById('pass-code').value;

        if (!name) { alert("Por favor, digite seu nome!"); return; }

        if (role === 'admin' && pass !== SECRET_KEY) {
            alert("Senha de Administrador incorreta!");
            return;
        }

        // Salvar log
        let logs = JSON.parse(localStorage.getItem('logs') || "[]");
        logs.push({ nome: name, hora: new Date().toLocaleTimeString(), tipo: role });
        localStorage.setItem('logs', JSON.stringify(logs));

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        if (role === 'admin') document.getElementById('admin-btn').classList.remove('hidden');
    }

    // Funções de conteúdo e admin seguem a mesma lógica anterior...
    function renderContent(nivel) {
        document.getElementById('content-area').innerHTML = `<h3>Nível ${nivel.toUpperCase()} carregado!</h3>`;
    }

    function renderAdmin() {
        const logs = JSON.parse(localStorage.getItem('logs') || "[]");
        let t = "<h2>Logs</h2><table><tr><th>Nome</th><th>Hora</th></tr>";
        logs.forEach(l => t += `<tr><td>${l.nome}</td><td>${l.hora}</td></tr>`);
        document.getElementById('content-area').innerHTML = t + "</table>";
    }
</script>
</body>
</html>
